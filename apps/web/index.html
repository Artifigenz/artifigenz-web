<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Artifigenz</title>
  <meta name="description" content="Artifigenz builds AI-native products for the agentic era. Founded by Cooper and Rajan RK.">
  <link rel="icon" type="image/png" href="assets/logo.png">
  <link rel="apple-touch-icon" href="assets/logo.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #ffffff;
      --text: #1a1a1a;
      --text-mid: #3d3830;
      --text-dim: #6b6b6b;
      --accent: #e85d26;
      --font: 'JetBrains Mono', monospace;
      --border: rgba(0, 0, 0, 0.08);
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #0a0a0a;
        --text: #f5f5f5;
        --text-mid: #c0c0c0;
        --text-dim: #888888;
        --border: rgba(255, 255, 255, 0.1);
      }
    }

    html, body {
      height: 100%;
      overflow: hidden;
    }

    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    /* ========== PARTICLE CANVAS ========== */
    #particle-canvas {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      z-index: 0;
      pointer-events: none;
    }

    /* ========== GRAIN OVERLAY ========== */
    .grain {
      position: fixed;
      top: -50%; left: -50%;
      width: 200%; height: 200%;
      z-index: 1;
      pointer-events: none;
      opacity: 0.045;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='1'/%3E%3C/svg%3E");
      background-size: 512px 512px;
    }

    /* ========== FULL-PAGE LAYOUT ========== */
    .page {
      position: relative;
      z-index: 2;
      height: 100vh;
      display: grid;
      grid-template-rows: auto 1fr auto;
      grid-template-columns: 1fr;
    }

    /* ========== HEADER ========== */
    header {
      padding: 24px 40px;
      display: flex;
      align-items: center;
    }

    .logo-mark {
      display: flex;
      align-items: center;
      gap: 12px;
      text-decoration: none;
      color: var(--text);
    }

    .logo-mark img.logo-icon { width: 30px; height: 30px; object-fit: contain; }

    .logo-mark span {
      font-family: var(--font);
      font-size: 1.05rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    /* ========== MAIN CONTENT ========== */
    .main {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0 40px;
      gap: 0;
    }

    .main-inner {
      display: flex;
      align-items: center;
      justify-content: space-between;
      width: 100%;
      max-width: 1200px;
      gap: 60px;
    }

    /* Left — Hero */
    .hero {
      flex: 1;
      max-width: 620px;
    }

    .hero-title {
      font-family: var(--font);
      font-size: clamp(1.6rem, 3.2vw, 2.8rem);
      font-weight: 300;
      letter-spacing: -0.01em;
      line-height: 1.15;
      color: var(--text);
      margin-bottom: 16px;
      opacity: 0;
      transform: translateY(20px);
      animation: fadeUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) 0.2s forwards;
    }

    .hero-title .hero-brand {
      display: block;
      font-size: clamp(3.2rem, 6.5vw, 5.8rem);
      font-weight: 700;
      letter-spacing: -0.04em;
      line-height: 1.0;
      margin-bottom: 8px;
    }

    .hero-tagline {
      font-family: var(--font);
      font-size: clamp(0.85rem, 1.5vw, 1rem);
      font-weight: 300;
      color: var(--text-dim);
      letter-spacing: 0.01em;
      opacity: 0;
      transform: translateY(14px);
      animation: fadeUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) 0.45s forwards;
    }

    @keyframes fadeUp {
      to { opacity: 1; transform: translateY(0); }
    }

    /* Right — Products */
    .products {
      flex-shrink: 0;
      width: 380px;
    }

    .products-label {
      font-family: var(--font);
      font-size: 0.7rem;
      font-weight: 300;
      text-transform: uppercase;
      letter-spacing: 0.18em;
      color: var(--text-dim);
      margin-bottom: 16px;
    }

    .products-list {
      display: flex;
      flex-direction: column;
      gap: 0;
    }

    .product-item {
      padding: 16px 0;
      border-bottom: 1px solid var(--border);
      opacity: 0;
      transform: translateY(10px);
      transition: transform 0.25s ease, border-color 0.25s ease;
      position: relative;
    }

    .product-item:first-child {
      border-top: 1px solid var(--border);
    }

    .product-item:hover {
      transform: translateX(6px);
    }

    .product-item:hover .product-name {
      color: var(--accent);
    }

    .product-item.visible {
      animation: fadeUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }

    .product-name {
      font-family: var(--font);
      font-size: 1rem;
      font-weight: 500;
      color: var(--text);
      letter-spacing: 0.02em;
      margin-bottom: 2px;
      transition: color 0.25s ease;
    }

    .product-desc {
      font-family: var(--font);
      font-size: 0.78rem;
      color: var(--text-dim);
      font-weight: 300;
      letter-spacing: 0.01em;
    }

    /* ========== FOOTER ========== */
    footer {
      padding: 20px 40px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 12px;
    }

    .footer-left {
      font-family: var(--font);
      font-size: 0.78rem;
      color: var(--text-dim);
      font-weight: 400;
    }

    .footer-left a {
      color: var(--text-mid);
      text-decoration: none;
      font-weight: 500;
      transition: color 0.3s ease;
    }

    .footer-left a:hover { color: var(--text); }

    .footer-right {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .footer-right a {
      display: flex;
      align-items: center;
      gap: 5px;
      color: var(--text-dim);
      text-decoration: none;
      font-family: var(--font);
      font-size: 0.72rem;
      font-weight: 400;
      letter-spacing: 0.03em;
      transition: color 0.3s ease;
    }

    .footer-right a:hover { color: var(--text); }
    .footer-right svg { width: 12px; height: 12px; fill: currentColor; }

    /* ========== RESPONSIVE ========== */
    @media (max-width: 900px) {
      .main-inner {
        flex-direction: column;
        align-items: flex-start;
        gap: 32px;
        padding-top: 16px;
      }

      .hero { max-width: 100%; }
      .products { width: 100%; max-width: 400px; }

      .hero-title { font-size: clamp(1.3rem, 4vw, 2.2rem); }
      .hero-title .hero-brand { font-size: clamp(2.4rem, 9vw, 4rem); }
    }

    @media (max-width: 600px) {
      header { padding: 16px 20px; }
      .main { padding: 0 20px; }
      footer { padding: 14px 20px; }
      .logo-mark img.logo-icon { width: 24px; height: 24px; }
      .logo-mark span { font-size: 0.9rem; }

      .main-inner { gap: 24px; }
      .product-item { padding: 12px 0; }
      .product-name { font-size: 0.9rem; }
      .product-desc { font-size: 0.75rem; }
    }

    /* ========== SELECTION ========== */
    ::selection {
      background: rgba(232, 93, 38, 0.15);
      color: var(--text);
    }
  </style>
</head>
<body>

  <!-- Particle system -->
  <canvas id="particle-canvas"></canvas>

  <!-- Grain -->
  <div class="grain"></div>

  <!-- Page -->
  <div class="page">

    <header>
      <a href="/" class="logo-mark">
        <img class="logo-icon" src="assets/logo_transparent.png" alt="Artifigenz">
        <span>Artifigenz</span>
      </a>
    </header>

    <main class="main">
      <div class="main-inner">

        <section class="hero">
          <h1 class="hero-title"><span class="hero-brand">Artifigenz.</span>Built for the<br>agentic era</h1>
          <p class="hero-tagline">agents. building. agents.</p>
        </section>

        <section class="products">
          <div class="products-label">the fleet</div>
          <div class="products-list">
            <div class="product-item" data-delay="0">
              <div class="product-name">AgentBoba</div>
              <div class="product-desc">the trust authority for AI agents</div>
            </div>
            <div class="product-item" data-delay="80">
              <div class="product-name">RunLife</div>
              <div class="product-desc">personal life OS</div>
            </div>
            <div class="product-item" data-delay="160">
              <div class="product-name">Gorilla</div>
              <div class="product-desc">AI marketing engine for X</div>
            </div>
            <div class="product-item" data-delay="240">
              <div class="product-name">TARS</div>
              <div class="product-desc">shipping pulse dashboard</div>
            </div>
          </div>
        </section>

      </div>
    </main>

    <footer>
      <p class="footer-left">
        Founded by
        <a href="https://x.com/CooperAIWorks" target="_blank" rel="noopener">Cooper</a>
        and
        <a href="https://x.com/rajanbuilds" target="_blank" rel="noopener">Rajan RK</a>
      </p>
      <div class="footer-right">
        <a href="https://x.com/FigenzAI" target="_blank" rel="noopener">
          <svg viewBox="0 0 24 24"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg>
          @FigenzAI
        </a>
      </div>
    </footer>

  </div>

  <script>
    /* ========== MOUSE-FOLLOWING PARTICLE CLOUD ========== */
    (function() {
      const canvas = document.getElementById('particle-canvas');
      const ctx = canvas.getContext('2d');
      let w, h;
      let mouse = { x: -9999, y: -9999 };
      let smoothMouse = { x: -9999, y: -9999 };
      let isDark = window.matchMedia('(prefers-color-scheme: dark)').matches;

      window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', e => {
        isDark = e.matches;
      });

      function resize() {
        w = canvas.width = window.innerWidth;
        h = canvas.height = window.innerHeight;
      }
      window.addEventListener('resize', resize);
      resize();

      document.addEventListener('mousemove', e => {
        mouse.x = e.clientX;
        mouse.y = e.clientY;
      });

      /* Particle cloud — concentrated clusters that gravitate toward cursor */
      const PARTICLE_COUNT = Math.min(1800, Math.floor(w * h / 600));
      const particles = [];

      /* Create particles in clustered groups */
      const clusterCenters = [
        { x: 0.3, y: 0.4 },
        { x: 0.6, y: 0.5 },
        { x: 0.45, y: 0.6 },
        { x: 0.7, y: 0.35 },
        { x: 0.25, y: 0.55 },
      ];

      for (let i = 0; i < PARTICLE_COUNT; i++) {
        const cluster = clusterCenters[Math.floor(Math.random() * clusterCenters.length)];
        const spread = 0.18;
        particles.push({
          x: (cluster.x + (Math.random() - 0.5) * spread) * w,
          y: (cluster.y + (Math.random() - 0.5) * spread) * h,
          r: Math.random() * 1.4 + 0.3,
          vx: (Math.random() - 0.5) * 0.08,
          vy: (Math.random() - 0.5) * 0.08,
          baseAlpha: 0.03 + Math.random() * 0.09,
          drift: Math.random() * Math.PI * 2,
          driftSpeed: 0.002 + Math.random() * 0.004,
          driftRadius: 0.3 + Math.random() * 0.5,
        });
      }

      let time = 0;

      function animate() {
        time += 1;
        ctx.clearRect(0, 0, w, h);

        smoothMouse.x += (mouse.x - smoothMouse.x) * 0.06;
        smoothMouse.y += (mouse.y - smoothMouse.y) * 0.06;

        for (let i = 0; i < particles.length; i++) {
          const p = particles[i];

          const driftAngle = p.drift + time * p.driftSpeed;
          const driftX = Math.sin(driftAngle) * p.driftRadius;
          const driftY = Math.cos(driftAngle * 0.7 + 1.3) * p.driftRadius;

          p.vx += driftX * 0.002;
          p.vy += driftY * 0.002;

          const dx = smoothMouse.x - p.x;
          const dy = smoothMouse.y - p.y;
          const dist = Math.sqrt(dx * dx + dy * dy);
          const attractRadius = 450;

          if (dist < attractRadius && dist > 1) {
            const force = (1 - dist / attractRadius) * 0.012;
            p.vx += (dx / dist) * force;
            p.vy += (dy / dist) * force;
          }

          p.vx *= 0.985;
          p.vy *= 0.985;

          p.x += p.vx;
          p.y += p.vy;

          if (p.x < -20) p.x = w + 20;
          if (p.x > w + 20) p.x = -20;
          if (p.y < -20) p.y = h + 20;
          if (p.y > h + 20) p.y = -20;

          let alpha = p.baseAlpha;
          if (dist < 300) {
            alpha += (1 - dist / 300) * 0.04;
          }

          const baseGray = isDark ? 200 : 42;
          const gray = baseGray + Math.floor(Math.random() * 8);
          ctx.beginPath();
          ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
          ctx.fillStyle = `rgba(${gray}, ${gray}, ${gray}, ${alpha})`;
          ctx.fill();
        }

        requestAnimationFrame(animate);
      }

      animate();
    })();

    /* ========== STAGGERED PRODUCT REVEAL ========== */
    (function() {
      const items = document.querySelectorAll('.product-item');
      items.forEach(item => {
        const delay = parseInt(item.dataset.delay) || 0;
        setTimeout(() => item.classList.add('visible'), 600 + delay);
      });
    })();
  </script>

</body>
</html>
